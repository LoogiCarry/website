<!DOCTYPE html>
<html style="font-family:Trebuchet MS">
<style>
  body {
    margin: 0;
  }
/* tutaj się dzieje pewna magia żeby miec takie fajne tło*/
  body::before {
    content: "";
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;

    background: repeating-conic-gradient(
      #828282 0% 25%,
      #747373 0% 50%
    );
    background-size: 80px 80px;

    animation: moveBg 20s linear infinite;
    z-index: -1;
  }

  @keyframes moveBg {
    from {
      transform: rotate(-15.5deg) translate(0, 0);
    }
    to {
      transform: rotate(-15.5deg) translate(100px, 100px);
    }
  }
</style>

<style>
  @property --angle {
    syntax: "<angle>";
    inherits: false;
    initial-value: 0deg;
  }

  .image-rotato {
    /* trans Y to jest żeby w góre i dól a ten rotate to na prawo na lewo w góre i w dól, do przodu do tyłu w góre i dół*/
    transform: 
      translateY(calc(sin(var(--angle)) * 30px)) 
      rotate(calc(cos(var(--angle)) * 5deg));
    
    animation: wave 4s linear infinite;
    width: 30%;
  }

  @keyframes wave {
    to { --angle: 360deg; }
  }
</style>
